server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Render backend service
    location /api/ {
        proxy_pass https://kenexai-athlete-backend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host kenexai-athlete-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy dashboard requests to Render backend service
    location /dashboard/ {
        proxy_pass https://kenexai-athlete-backend.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header Host kenexai-athlete-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
