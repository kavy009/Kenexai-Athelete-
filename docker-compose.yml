services:
  backend:
    build:
      context: .
      dockerfile: docker-backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./database.sqlite:/database.sqlite:ro
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/leagues"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: docker-frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
